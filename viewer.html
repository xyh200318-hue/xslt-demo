<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XML to HTML Viewer (XSLT) – Guided Learning Records</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 0 20px; background: #fafafa; }
        h2 { color: #2c3e50; }
        .controls { margin: 15px 0; }
        button {
            padding: 8px 20px; cursor: pointer;
            background: #2c3e50; color: #fff; border: none; border-radius: 4px; font-size: 14px;
        }
        button:hover { background: #34495e; }
        .error { color: #721c24; background: #f8d7da; padding: 12px; border-left: 5px solid #dc3545; border-radius: 4px; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>XSLT Transformation Viewer – Guided Learning Records</h2>
    <div class="controls">
        <button id="loadBtn">Load and Transform</button>
    </div>
    <div id="output">Click the button to load <code>learning_records.xml</code> and apply XSLT transformation.</div>
    <script>
        (function() {
            const xmlUrl = 'learning_records.xml';
            const xslUrl = 'style1.xsl';
            const loadBtn = document.getElementById('loadBtn');
            const outputDiv = document.getElementById('output');

            async function loadXML(url) {
                const response = await fetch(url);
                if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                const text = await response.text();
                return new DOMParser().parseFromString(text, 'application/xml');
            }

            async function transform() {
                outputDiv.innerHTML = '<em>Loading and transforming...</em>';
                try {
                    var xmlDoc = await loadXML(xmlUrl);
                    var xslDoc = await loadXML(xslUrl);

                    var parseError = xmlDoc.querySelector('parsererror');
                    if (parseError) throw new Error('XML parsing error: ' + parseError.textContent);

                    var xsltProcessor = new XSLTProcessor();
                    xsltProcessor.importStylesheet(xslDoc);
                    var resultDoc = xsltProcessor.transformToFragment(xmlDoc, document);

                    outputDiv.innerHTML = '';
                    outputDiv.appendChild(resultDoc);
                } catch (err) {
                    outputDiv.innerHTML = '<div class="error"><strong>Error:</strong> ' + err.message + '</div>';
                }
            }

            loadBtn.addEventListener('click', transform);
        })();
    </script>
</body>
</html>
