<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Badges – XSLT Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    #output { margin: 12px auto; max-width: 1000px; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Scout Badges – XSLT Demo</h1>
  <div id="output">Loading...</div>

  <script>
    function loadAndTransform() {
      const out = document.getElementById('output');
      const parser = new DOMParser();
      const processor = new XSLTProcessor();

      // 同仓库相对路径（和 HTML 放在同一目录下）
      const xmlURL = './data.xml';   // 你的 badges XML
      const xslURL = './style.xsl';  // 上面的 XSL

      fetch(xslURL)
        .then(res => {
          if (!res.ok) throw new Error('Failed to fetch XSL: ' + res.status);
          return res.text();
        })
        .then(xslText => {
          const xslDoc = parser.parseFromString(xslText, 'application/xml');
          const errNode = xslDoc.querySelector('parsererror');
          if (errNode) throw new Error('XSL parse error: ' + errNode.textContent);

          processor.importStylesheet(xslDoc);

          return fetch(xmlURL).then(res => {
            if (!res.ok) throw new Error('Failed to fetch XML: ' + res.status);
            return res.text();
          });
        })
        .then(xmlText => {
          const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
          const errNode = xmlDoc.querySelector('parsererror');
          if (errNode) throw new Error('XML parse error: ' + errNode.textContent);

          const fragment = processor.transformToFragment(xmlDoc, document);
          out.textContent = '';
          out.appendChild(fragment);
        })
        .catch(err => {
          console.error(err);
          out.textContent = 'Transform error: ' + err.message;
        });
    }

    window.addEventListener('DOMContentLoaded', loadAndTransform);
  </script>
</body>
</html>
