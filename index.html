<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSLT Transform Result</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; }
        #result-container { border: 1px solid #ccc; padding: 20px; margin-top: 20px; min-height: 100px; }
        .loading { color: #888; }
        .error { color: red; }
    </style>
</head>
<body>

    <h1>XML to HTML via XSLT</h1>
    <p>The content below is dynamically generated by browser-side JavaScript:</p>

    <!-- The transformation result will be displayed here -->
    <div id="result-container" class="loading">Loading and transforming data...</div>

    <script>
        // Execute after the page has loaded
        window.onload = function() {
            const resultContainer = document.getElementById('result-container');

            // 1. Create an XSLTProcessor instance
            const processor = new XSLTProcessor();

            // 2. Load the XSLT file asynchronously
            fetch('style.xsl')
                .then(response => response.text())
                .then(xslText => {
                    // Parse the XSLT string into a document
                    const parser = new DOMParser();
                    const xslDoc = parser.parseFromString(xslText, "application/xml");

                    // Check if the XSLT file has a parsing error
                    const parseError = xslDoc.querySelector("parsererror");
                    if (parseError) {
                        throw new Error("XSLT parse error: " + parseError.textContent);
                    }

                    // Import the XSLT stylesheet into the processor
                    processor.importStylesheet(xslDoc);

                    // 3. Load the XML file asynchronously
                    return fetch('data.xml');
                })
                .then(response => response.text())
                .then(xmlText => {
                    // Parse the XML string into a document
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "application/xml");

                    // Check if the XML file has a parsing error
                    const parseError = xmlDoc.querySelector("parsererror");
                    if (parseError) {
                        throw new Error("XML parse error: " + parseError.textContent);
                    }

                    // 4. Perform the transformation
                    const resultDoc = processor.transformToDocument(xmlDoc);

                    // 5. Display the transformation result (HTML document) on the page
                    // We need to get the outer HTML of the transformed document element
                    const resultHTML = resultDoc.documentElement.outerHTML;
                    resultContainer.innerHTML = resultHTML;
                    resultContainer.className = ''; // Remove loading style
                })
                .catch(error => {
                    console.error("An error occurred during transformation:", error);
                    resultContainer.innerHTML = `<p class="error">Transformation failed! Press F12 to open Developer Tools and check the console for error details.</p><pre>${error.message}</pre>`;
                    resultContainer.className = 'error';
                });
        };
    </script>

</body>
</html>
